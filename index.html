<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Windows App Launcher</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 30px;
      text-align: center;
      background: #f5f5f5;
    }
    h2 {
      margin-bottom: 20px;
    }
    button {
      display: block;
      width: 90%;
      max-width: 320px;
      margin: 12px auto;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
    #launchApp { background: #0078d4; color: white; }
    #launchWeb { background: #e0e0e0; }
    #launchDocs { background: #ffd400; }
    #status {
      margin-top: 25px;
      font-size: 14px;
      color: #444;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h2>Windows App Launcher</h2>

  <button id="launchApp">Launch Windows App</button>
  <button id="launchWeb">Launch Web Client</button>
  <button id="launchDocs">Windows 365 Docs</button>

  <div id="status">Ready…</div>

  <script src="router.js"></script>
</body>
</html>
